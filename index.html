<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SAC Back-office — Cellfy</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;background:#0a0a0a;color:#fff;min-height:100vh;padding:0}
.header{background:#111;border-bottom:1px solid #222;padding:16px 24px;display:flex;align-items:center;gap:12px}
.header img{height:32px}
.header-divider{width:1px;height:24px;background:#333}
.header-title{font-size:13px;color:#888}
.container{padding:32px 24px;max-width:640px;margin:0 auto}
.form-card{background:#111;border:1px solid #222;border-radius:16px;padding:2rem}
.form-header{margin-bottom:1.5rem;padding-bottom:1rem;border-bottom:1px solid #222}
.form-header h2{font-size:18px;font-weight:600;color:#fff}
.form-header p{font-size:13px;color:#666;margin-top:4px}
.field{margin-bottom:1rem}
.field label{display:block;font-size:12px;font-weight:500;color:#888;margin-bottom:6px;text-transform:uppercase;letter-spacing:0.5px}
.field input,.field select,.field textarea{width:100%;padding:10px 12px;font-size:14px;border:1px solid #222;border-radius:8px;background:#0a0a0a;color:#fff;font-family:inherit;transition:border .15s}
.field input:focus,.field select,.field textarea:focus{outline:none;border-color:#7c3aed}
.field select option{background:#111}
.field textarea{resize:vertical;min-height:80px;line-height:1.5}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.tipo-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.tipo-btn{padding:10px 12px;font-size:13px;border:1px solid #222;border-radius:8px;background:#0a0a0a;color:#888;cursor:pointer;text-align:left;transition:all .15s}
.tipo-btn:hover{border-color:#444;color:#fff}
.tipo-btn.sel{background:#1e1033;border-color:#7c3aed;color:#a855f7;font-weight:500}
.submit-btn{width:100%;padding:12px;font-size:14px;font-weight:600;background:linear-gradient(135deg,#7c3aed,#a855f7);color:#fff;border:none;border-radius:8px;cursor:pointer;margin-top:0.5rem;transition:opacity .15s}
.submit-btn:hover{opacity:0.9}
.submit-btn:disabled{opacity:0.5;cursor:not-allowed}
.msg{display:none;border-radius:8px;padding:12px 16px;font-size:14px;margin-top:1rem}
.msg-ok{background:#0d2a1a;border:1px solid #166534;color:#4ade80}
.msg-erro{background:#2a0d0d;border:1px solid #991b1b;color:#f87171}
.tag{display:inline-block;background:#1a1a2e;color:#a855f7;font-size:11px;padding:3px 8px;border-radius:20px;font-weight:500;margin-bottom:8px}
</style>
</head>
<body>

<div class="header">
  <img src="https://www.cellfy.com.br/cdn/shop/files/logo.png?v=1753990401" alt="Cellfy">
  <div class="header-divider"></div>
  <span class="header-title">SAC Back-office</span>
</div>

<div class="container">
<div class="form-card">
  <div class="form-header">
    <span class="tag">Interno</span>
    <h2>Solicitação de back-office</h2>
    <p>Preencha e envie — o back-office processa em até 2h</p>
  </div>

  <div class="field">
    <label>Tipo de solicitação</label>
    <div class="tipo-grid">
      <button class="tipo-btn sel" onclick="selTipo(this)">Emissão de reversa</button>
      <button class="tipo-btn" onclick="selTipo(this)">Chamado Mandaê</button>
      <button class="tipo-btn" onclick="selTipo(this)">Chamado PEX</button>
      <button class="tipo-btn" onclick="selTipo(this)">Chamado Melhor Envio</button>
      <button class="tipo-btn" onclick="selTipo(this)">Acompanhamento</button>
      <button class="tipo-btn" onclick="selTipo(this)">Outro</button>
    </div>
  </div>

  <div class="field-row">
    <div class="field">
      <label>Nº do pedido *</label>
      <input type="text" id="f-pedido" placeholder="Ex: 123456789">
    </div>
    <div class="field">
      <label>Canal *</label>
      <select id="f-canal">
        <option value="">Selecione...</option>
        <option>Mercado Livre</option>
        <option>Shopee</option>
        <option>KaBuM</option>
        <option>WhatsApp</option>
        <option>Site</option>
        <option>Outro</option>
      </select>
    </div>
  </div>

  <div class="field-row">
    <div class="field">
      <label>Nome do cliente *</label>
      <input type="text" id="f-cliente" placeholder="Nome completo">
    </div>
    <div class="field">
      <label>Atendente *</label>
      <select id="f-atendente">
        <option value="">Selecione...</option>
        <option>Roseane</option>
        <option>Sarah</option>
        <option>Larissa</option>
        <option>Rafaela</option>
      </select>
    </div>
  </div>

  <div class="field">
    <label>Motivo / descrição</label>
    <textarea id="f-obs" placeholder="Descreva brevemente o problema ou o que precisa ser feito..."></textarea>
  </div>

  <div class="field-row">
    <div class="field">
      <label>Prazo do canal</label>
      <input type="date" id="f-prazo">
    </div>
    <div class="field">
      <label>SLA esperado</label>
      <select id="f-sla">
        <option value="">Selecione...</option>
        <option value="2h">2h — chamado urgente</option>
        <option value="4h">4h — chamado padrão</option>
        <option value="24h">24h — acompanhamento</option>
        <option value="48h">48h — caso complexo</option>
      </select>
    </div>
  </div>

  <button class="submit-btn" id="btn-enviar" onclick="enviarForm()">Enviar solicitação</button>
  <div class="msg msg-ok" id="msg-ok">✅ Solicitação enviada com sucesso! O back-office irá processar em breve.</div>
  <div class="msg msg-erro" id="msg-erro">❌ Preencha todos os campos obrigatórios.</div>
</div>
</div>

<script>
const SCRIPT_URL="https://script.google.com/macros/s/AKfycbyipif36QYAntfC5FxN6_-A1oSuxZMd42dlfGmCN-ydy5dw_IDSjYBwvq8Mk3-XqVeE/exec";
let tipoSel="Emissão de reversa";

function selTipo(btn){
  document.querySelectorAll('.tipo-btn').forEach(b=>b.classList.remove('sel'));
  btn.classList.add('sel');
  tipoSel=btn.textContent;
}

function getNow(){
  const d=new Date();
  return String(d.getDate()).padStart(2,'0')+'/'+String(d.getMonth()+1).padStart(2,'0')+'/'+d.getFullYear()+' '+String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0')+':'+String(d.getSeconds()).padStart(2,'0');
}

function enviarForm(){
  const pedido=document.getElementById('f-pedido').value.trim();
  const canal=document.getElementById('f-canal').value;
  const cliente=document.getElementById('f-cliente').value.trim();
  const atendente=document.getElementById('f-atendente').value;
  if(!pedido||!canal||!cliente||!atendente){
    document.getElementById('msg-erro').style.display='block';
    document.getElementById('msg-ok').style.display='none';
    setTimeout(()=>document.getElementById('msg-erro').style.display='none',4000);
    return;
  }
  const btn=document.getElementById('btn-enviar');
  btn.disabled=true;btn.textContent='Enviando...';
  const payload={
    dataHora:getNow(),pedido,canal,tipo:tipoSel,atendente,cliente,
    sla:document.getElementById('f-sla').value||'—',
    prazo:document.getElementById('f-prazo').value||'—',
    observacao:document.getElementById('f-obs').value.trim()||'—'
  };
  fetch(SCRIPT_URL,{method:'POST',mode:'no-cors',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)})
  .then(()=>{
    document.getElementById('msg-ok').style.display='block';
    document.getElementById('msg-erro').style.display='none';
    ['f-pedido','f-cliente','f-obs'].forEach(id=>document.getElementById(id).value='');
    ['f-canal','f-atendente','f-sla'].forEach(id=>document.getElementById(id).value='');
    document.getElementById('f-prazo').value='';
    document.querySelectorAll('.tipo-btn').forEach((b,i)=>b.classList.toggle('sel',i===0));
    tipoSel='Emissão de reversa';
    setTimeout(()=>document.getElementById('msg-ok').style.display='none',5000);
  })
  .catch(()=>{
    document.getElementById('msg-erro').style.display='block';
    setTimeout(()=>document.getElementById('msg-erro').style.display='none',4000);
  })
  .finally(()=>{btn.disabled=false;btn.textContent='Enviar solicitação';});
}
</script>
</body>
</html>
